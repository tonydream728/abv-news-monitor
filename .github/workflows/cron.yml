name: 24/7 ABV 8大主題新聞自動監控

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼庫
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        pip install requests google-generativeai

    - name: 執行 AI Agent 8大主題重組搜集
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_news.py

    - name: 自動提交並更新網頁數據
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/daily_report.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新今日8大主題餐飲新聞" && git push)
