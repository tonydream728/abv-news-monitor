name: 24/7 ABV 8大主題新聞自動監控

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: 1. 檢查程式碼庫
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件
      run: |
        pip install requests google-generativeai

    - name: 4. 執行 AI Agent 8大主題重組搜集
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_news.py

    - name: 5. 完美對接設定 GitHub Pages
      uses: actions/configure-pages@v4

    - name: 6. 將網頁與 AI 數據同時打包成包裹
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: 7. 聯動開通店面 (直接推播發布網頁)
      id: deployment
      uses: actions/deploy-pages@v4
